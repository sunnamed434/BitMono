name: 'Project Build'
description: 'Builds BitMono projects'
inputs:
  project_path:
    description: 'Path to project folder'
    required: true
  target_framework:
    description: 'The target framework to build on'
    required: true
  use_runtime:
    description: 'Include runtime flag? Set to true for self-contained builds, false (default) for global tools.'
    required: false
    default: true
  runtime_version:
    description: 'Build runtime version (default linux-x64) if using a runtime flag'
    required: false
    default: 'linux-x64'
  nuget_push:
    description: 'Push to NuGet on release?'
    required: false
    default: false
  nuget_user:
    description: 'nuget.org username (profile name) for Trusted Publishing via OIDC'
    required: false
  github_token:
    description: 'GitHub token'
    required: false
outputs:
  version:
    description: "Generated version (SemVersion compatible)"
    value: ${{ steps.get-version.outputs.version }}
  is_prerelease:
    description: 'Gets if the version is a prerelease'
    value: ${{ steps.check-prerelease.outputs.is_prerelease }}
runs:
  using: "composite"
  steps:
    # Generate semver compatible version from current tag and commit hash
    - name: Create version
      id: get-version
      run: echo "version=$(git describe --tags `git rev-list --tags --max-count=1`)+$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Check Prerelease
      id: check-prerelease
      run: "if ${{ contains(steps.get-version.outputs.version, '-') }}; then
              echo is_prerelease=true >> $GITHUB_OUTPUT;
            else
              echo is_prerelease=false >> $GITHUB_OUTPUT;
            fi"
      shell: bash

    # Determine whether to include the --runtime flag.
    - name: Set runtime flag
      id: set-runtime-flag
      run: |
        if [ "${{ inputs.use_runtime }}" = "true" ]; then
          echo "runtime=--runtime ${{ inputs.runtime_version }}" >> $GITHUB_OUTPUT
        else
          echo "runtime=" >> $GITHUB_OUTPUT
        fi
      shell: bash

    # Commands that are used multiple times.
    - name: Common commands
      id: common-commands
      run: |
        echo "dotnet-restore=dotnet restore \$PROJECT_PATH ${{ steps.set-runtime-flag.outputs.runtime }} -p:Configuration=Release -p:TargetFramework=${{ inputs.target_framework }}" >> $GITHUB_OUTPUT
        echo "dotnet-build=dotnet build \$PROJECT_PATH --configuration Release --no-restore ${{ steps.set-runtime-flag.outputs.runtime }} -p:TargetFramework=${{ inputs.target_framework }} -p:BitMonoVersion=${{ steps.get-version.outputs.version }}" >> $GITHUB_OUTPUT
        echo "dotnet-test=dotnet test \$PROJECT_PATH --configuration Release --no-restore --no-build ${{ steps.set-runtime-flag.outputs.runtime }} -p:TargetFramework=${{ inputs.target_framework }}" >> $GITHUB_OUTPUT
      shell: bash

    # Install dependencies (separate step for caching)
    - name: Install dependencies
      run: |
        ${{ steps.common-commands.outputs.dotnet-restore }}
        pwsh -File .github/actions/project-build/run-command-for-every-tests-project.ps1 "$GITHUB_WORKSPACE/tests" '${{ steps.common-commands.outputs.dotnet-restore }}'
      env:
        PROJECT_PATH: ${{ inputs.project_path }}
      shell: bash

    # Build project
    - name: Build
      run: |
        ${{ steps.common-commands.outputs.dotnet-build }}
        pwsh -File .github/actions/project-build/run-command-for-every-tests-project.ps1 "$GITHUB_WORKSPACE/tests" '${{ steps.common-commands.outputs.dotnet-build }}'
      env:
        PROJECT_PATH: ${{ inputs.project_path }}
      shell: bash

    # Test project
    - name: Test
      run: |
        pwsh -File .github/actions/project-build/run-command-for-every-tests-project.ps1 "$GITHUB_WORKSPACE/tests" '${{ steps.common-commands.outputs.dotnet-test }}'
      env:
        PROJECT_PATH: ${{ inputs.project_path }}
      shell: bash

    # Push to GitHub packages on each commit and release (Nightly)
    - name: Push to NuGet (Nightly)
      run: if ${{ inputs.nuget_push == 'true' && (github.event_name == 'push' || (github.event_name == 'create' && github.event.ref_type == 'tag')) }}; then
        dotnet nuget push ${{ inputs.project_path }}/bin/Release/*.nupkg --api-key ${{ inputs.github_token }} --skip-duplicate --source https://nuget.pkg.github.com/sunnamed434/index.json;
        fi
      shell: bash

    # Trusted Publishing (OIDC): exchange the GitHub token for a short-lived nuget.org API key,
    # right before the push (the key expires in ~1h). Only on non-prerelease tags.
    # Requires `id-token: write` on the calling workflow and a Trusted Publishing policy on nuget.org.
    - name: NuGet login (OIDC -> temp key)
      id: nuget-login
      if: ${{ inputs.nuget_push == 'true' && github.event_name == 'create' && github.event.ref_type == 'tag' && steps.check-prerelease.outputs.is_prerelease == 'false' }}
      uses: NuGet/login@v1
      with:
        user: ${{ inputs.nuget_user }}

    # Push to NuGet on each tag, but only if not a pre-release version (Release).
    # --skip-duplicate keeps re-runs idempotent: a 409 for an already-published version is a warning, not
    # a failure. The "Verify published on nuget.org" step below is the real gate - it turns a genuine
    # non-publish (a 409 that's actually a rejection, or a silent async-validation failure) red.
    - name: Push to NuGet (Release)
      if: ${{ inputs.nuget_push == 'true' && github.event_name == 'create' && github.event.ref_type == 'tag' && steps.check-prerelease.outputs.is_prerelease == 'false' }}
      run: dotnet nuget push ${{ inputs.project_path }}/bin/Release/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate --source https://api.nuget.org/v3/index.json
      shell: bash

    # The push step can pass without the package going live: --skip-duplicate turns a 409 into a warning,
    # and a 201 only means "accepted" before nuget.org runs async validation (virus/malware scan) that can
    # still reject it. Poll the flat container until the version is live so either case turns the build red.
    - name: Verify published on nuget.org
      if: ${{ inputs.nuget_push == 'true' && github.event_name == 'create' && github.event.ref_type == 'tag' && steps.check-prerelease.outputs.is_prerelease == 'false' }}
      shell: bash
      run: |
        id="$(basename '${{ inputs.project_path }}')"
        nupkg="$(basename "$(ls ${{ inputs.project_path }}/bin/Release/${id}.*.nupkg | head -1)")"
        ver="${nupkg#${id}.}"; ver="${ver%.nupkg}"
        lower="$(echo "$id" | tr '[:upper:]' '[:lower:]')"
        url="https://api.nuget.org/v3-flatcontainer/${lower}/index.json"
        echo "Verifying ${id} ${ver} is live on nuget.org (${url})"
        for i in $(seq 1 40); do
          if curl -fsS "$url" 2>/dev/null | grep -q "\"${ver}\""; then
            echo "OK: ${id} ${ver} is available on nuget.org"
            exit 0
          fi
          echo "  attempt ${i}/40: not visible yet, waiting 30s..."
          sleep 30
        done
        echo "::error::${id} ${ver} did not appear on nuget.org after ~20 min. The push was accepted (201) but async validation (e.g. a virus/malware scan) likely rejected it. Check the package status and notification email on nuget.org, and contact support if it is a false positive."
        exit 1
